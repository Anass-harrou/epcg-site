<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EPCG Tanger</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-color: #9B1C22;
            --secondary-color: #2b2b2b;
            --bg-light: #f4f7f6;
        }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-light); overflow-x: hidden; }
        
        /* LOGIN */
        #login-container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border-radius: 15px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-retour { color: #6c757d; text-decoration: none; font-size: 0.9rem; display: inline-block; transition: 0.3s; }
        .btn-retour:hover { color: var(--primary-color); transform: translateX(-3px); }
        
        /* DASHBOARD - LAYOUT */
        #admin-dashboard { display: none; }
        
        /* HEADER MOBILE */
        .mobile-header {
            display: none;
            background-color: var(--secondary-color);
            color: white;
            padding: 15px 20px;
            justify-content: space-between;
            align-items: center;
        }

        /* SIDEBAR (Desktop par défaut) */
        .sidebar { 
            background-color: var(--secondary-color); 
            min-height: 100vh; 
            color: white; 
            padding: 20px; 
            position: fixed; 
            width: 250px; /* Largeur fixe pour la sidebar */
            z-index: 1000; 
            transition: transform 0.3s ease-in-out;
        }
        
        /* MAIN CONTENT */
        .main-content { 
            padding: 40px; 
            margin-left: 250px; /* Aligné avec la largeur de la sidebar */
            transition: margin-left 0.3s ease;
        }

        /* ELEMENTS INTERNES */
        .table-container, .upload-container { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .nav-link { cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.6) !important; padding: 12px 15px; margin-bottom: 5px; }
        .nav-link:hover { color: white !important; background-color: rgba(255,255,255,0.05); border-radius: 8px;}
        .nav-link.active { color: white !important; background-color: var(--primary-color) !important; border-radius: 8px; }
        .btn-epcg { background-color: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 5px; }
        .btn-epcg:hover { background-color: #7a151a; color: white; }

        /* RESPONSIVE (Tablettes & Mobiles) */
        @media (max-width: 991px) {
            .mobile-header { display: flex; } /* Affiche la barre du haut */
            
            .sidebar {
                transform: translateX(-100%); /* Cache la sidebar à gauche */
                width: 280px;
                box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            }
            .sidebar.show {
                transform: translateX(0); /* Affiche la sidebar quand la classe 'show' est active */
            }
            
            .main-content {
                margin-left: 0; /* Prend toute la largeur */
                padding: 20px;
                width: 100%;
            }
            
            /* Overlay sombre quand le menu est ouvert */
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .sidebar-overlay.show { display: block; }
        }
    </style>
</head>
<body>

    <!-- SECTION LOGIN -->
    <div id="login-container">
        <div class="login-card text-center">
            <img src="./assets/logo-epcg.jpeg" alt="EPCG" class="mb-4" style="max-height: 80px;">
            <h4 class="mb-4 fw-bold">Espace Direction</h4>
            <form id="login-form">
                <input type="email" id="admin-email" class="form-control mb-3" placeholder="Email" required>
                <input type="password" id="admin-password" class="form-control mb-4" placeholder="Mot de passe" required>
                <button type="submit" class="btn-epcg w-100 mb-3">Connexion</button>
            </form>
            <div id="login-error" class="text-danger mb-3 small" style="display: none;">Accès refusé. Vérifiez vos identifiants.</div>
            <a href="index.html" class="btn-retour mt-2">
                <i class="bi bi-arrow-left me-1"></i> Retour au site
            </a>
        </div>
    </div>

    <!-- SECTION DASHBOARD -->
    <div id="admin-dashboard">
        
        <!-- HEADER MOBILE (Visible uniquement sur petits écrans) -->
        <div class="mobile-header">
            <h5 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2"></i> EPCG ADMIN</h5>
            <button class="btn btn-outline-light btn-sm border-0" onclick="toggleSidebar()">
                <i class="bi bi-list fs-3"></i>
            </button>
        </div>

        <!-- OVERLAY (Pour fermer le menu en cliquant à côté sur mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebarMenu">
            <div class="d-flex justify-content-between align-items-center mb-5 d-none d-lg-flex">
                <h5 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2"></i> EPCG ADMIN</h5>
            </div>
            <!-- Bouton fermer pour mobile -->
            <div class="text-end d-lg-none mb-4">
                <button class="btn btn-link text-white p-0" onclick="toggleSidebar()"><i class="bi bi-x-lg fs-4"></i></button>
            </div>
            
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a id="nav-inscriptions" onclick="switchTab('inscriptions')" class="nav-link active"><i class="bi bi-people me-2"></i> Inscriptions</a>
                </li>
                <li class="nav-item mt-2">
                    <a id="nav-media" onclick="switchTab('media')" class="nav-link"><i class="bi bi-camera-reels me-2"></i> Multimédia</a>
                </li>
                <li class="nav-item mt-5">
                    <button onclick="handleLogout()" class="btn btn-sm btn-outline-light w-100"><i class="bi bi-box-arrow-left me-2"></i> Déconnexion</button>
                </li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            
            <!-- TAB 1: INSCRIPTIONS -->
            <div id="tab-inscriptions">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                    <h2 class="fw-bold mb-2">Candidatures</h2>
                    <button onclick="fetchInscriptions()" class="btn btn-outline-secondary btn-sm mb-2"><i class="bi bi-arrow-clockwise me-1"></i> Actualiser</button>
                </div>
                <div class="table-container p-3 p-md-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" style="min-width: 600px;">
                            <thead class="table-light">
                                <tr><th>Nom</th><th>Email</th><th>Téléphone</th><th>Formation</th><th>Date</th></tr>
                            </thead>
                            <tbody id="inscriptions-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- TAB 2: MULTIMEDIA -->
            <div id="tab-media" style="display: none;">
                <h2 class="fw-bold mb-4">Gestion Multimédia</h2>
                
                <div class="upload-container p-3 p-md-4 mb-4">
                    <h5>Ajouter un fichier</h5>
                    <p class="text-muted small">Publiez sur la galerie du site.</p>
                    <div class="row g-2 align-items-end">
                        <div class="col-12 col-md-6">
                            <input type="file" id="media-file" class="form-control" accept="image/*,video/*">
                        </div>
                        <div class="col-12 col-sm-6 col-md-3">
                            <select id="media-type" class="form-select">
                                <option value="image">Image</option>
                                <option value="video">Vidéo</option>
                            </select>
                        </div>
                        <div class="col-12 col-sm-6 col-md-3">
                            <button onclick="uploadMedia()" id="upload-btn" class="btn-epcg w-100">Publier</button>
                        </div>
                    </div>
                </div>

                <div class="table-container p-3 p-md-4">
                    <h5>Fichiers en ligne</h5>
                    <div id="media-gallery" class="row g-3 mt-2">
                        <!-- Les miniatures s'afficheront ici -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://aytyetcwfzliikljlhhz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KV2wU4WAzWJgRVlgIoioWA_MnLEtnCz'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- GESTION DU MENU MOBILE ---
        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('show');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        // --- NAVIGATION DES ONGLETS ---
        function switchTab(tab) {
            document.getElementById('tab-inscriptions').style.display = tab === 'inscriptions' ? 'block' : 'none';
            document.getElementById('tab-media').style.display = tab === 'media' ? 'block' : 'none';
            document.getElementById('nav-inscriptions').classList.toggle('active', tab === 'inscriptions');
            document.getElementById('nav-media').classList.toggle('active', tab === 'media');
            
            // Fermer le menu mobile après avoir cliqué sur un lien
            if(window.innerWidth < 992) { toggleSidebar(); }
            
            if(tab === 'media') fetchGallery();
        }

        // --- AUTHENTIFICATION ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Connexion...';
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: document.getElementById('admin-email').value,
                password: document.getElementById('admin-password').value
            });
            
            if (error) {
                document.getElementById('login-error').style.display = 'block';
                btn.innerHTML = 'Connexion';
                btn.disabled = false;
            } else {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                fetchInscriptions();
            }
        });

        // --- GESTION DES INSCRIPTIONS ---
        async function fetchInscriptions() {
            const list = document.getElementById('inscriptions-list');
            list.innerHTML = '<tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-danger spinner-border-sm"></div> Chargement...</td></tr>';
            
            const { data, error } = await _supabase.from('inscriptions').select('*').order('created_at', { ascending: false });
            
            if(error) {
                list.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">Erreur: ${error.message}</td></tr>`;
                return;
            }

            if(data && data.length > 0) {
                list.innerHTML = data.map(item => `
                    <tr>
                        <td class="fw-bold">${item.nom_prenom}</td>
                        <td><a href="mailto:${item.email}" class="text-decoration-none text-dark">${item.email}</a></td>
                        <td><a href="tel:${item.telephone_1}" class="text-decoration-none text-dark">${item.telephone_1}</a></td>
                        <td><span class="badge bg-danger">${item.formation}</span></td>
                        <td><small class="text-muted">${new Date(item.created_at).toLocaleDateString()}</small></td>
                    </tr>
                `).join('');
            } else {
                list.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Aucune inscription pour le moment.</td></tr>';
            }
        }

        // --- GESTION DU STORAGE (UPLOAD) ---
        async function uploadMedia() {
            const fileInput = document.getElementById('media-file');
            const file = fileInput.files[0];
            const type = document.getElementById('media-type').value;
            const btn = document.getElementById('upload-btn');

            if (!file) return alert("Veuillez sélectionner un fichier.");

            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Traitement...';
            btn.disabled = true;

            const fileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`; // Sécurise le nom du fichier
            
            const { data, error } = await _supabase.storage.from('media').upload(fileName, file);

            if (error) {
                alert("Erreur lors de l'envoi : " + error.message);
            } else {
                const { data: { publicUrl } } = _supabase.storage.from('media').getPublicUrl(fileName);
                await _supabase.from('gallery').insert([{ url: publicUrl, type: type }]);
                
                alert("Fichier ajouté à la médiathèque avec succès !");
                fileInput.value = "";
                fetchGallery();
            }
            btn.innerHTML = 'Publier';
            btn.disabled = false;
        }

        // --- AFFICHER LA GALERIE ---
        async function fetchGallery() {
            const gallery = document.getElementById('media-gallery');
            gallery.innerHTML = '<div class="col-12 text-center py-4"><div class="spinner-border text-danger spinner-border-sm"></div></div>';
            
            const { data } = await _supabase.from('gallery').select('*').order('created_at', { ascending: false });
            
            if(data && data.length > 0) {
                gallery.innerHTML = data.map(item => `
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                        <div class="card h-100 border-0 shadow-sm overflow-hidden">
                            ${item.type === 'image' 
                                ? `<img src="${item.url}" class="card-img-top" style="height:160px; object-fit:cover;" alt="Média">` 
                                : `<video src="${item.url}" class="card-img-top" style="height:160px; object-fit:cover;" controls></video>`}
                            <div class="card-body p-2 text-center bg-light">
                                <button onclick="deleteMedia(${item.id}, '${item.url}')" class="btn btn-sm btn-outline-danger w-100"><i class="bi bi-trash"></i> Supprimer</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                gallery.innerHTML = '<div class="col-12 text-muted py-3 text-center">Aucun fichier dans la médiathèque.</div>';
            }
        }

        // --- SUPPRIMER UN MEDIA ---
        async function deleteMedia(id, url) {
            if(confirm('Êtes-vous sûr de vouloir supprimer ce fichier ? Il disparaîtra du site public.')) {
                try {
                    await _supabase.from('gallery').delete().eq('id', id);
                    const fileName = url.split('/').pop();
                    await _supabase.storage.from('media').remove([fileName]);
                    fetchGallery();
                } catch (err) {
                    alert('Erreur lors de la suppression.');
                }
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }
    </script>
</body>
</html>
